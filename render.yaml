services:
  - type: web
    name: tbgp-portal
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tbgp-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_MEMBER_ID
        sync: false
      - key: CLIENT_POOL_PERCENT
        value: "50"
      - key: CONTRACTOR_POOL_PERCENT
        value: "25"
      - key: ADMIN_ACCOUNT_PERCENT
        value: "25"
      - key: MEMBER_EARNINGS_CAP_FIRST_PROJECT
        value: "15000000"
      - key: MEMBER_EARNINGS_CAP_SECOND_PROJECT
        value: "10000000"
      - key: MEMBER_EARNINGS_CAP_NTH_PROJECT
        value: "5000000"
      - key: MEMBER_LIFETIME_EARNINGS_CAP
        value: "50000000"
      - key: MEMBER_LIFETIME_PROJECT_CAP_AFTER_LIMIT
        value: "1000000"

databases:
  - name: tbgp-db
    databaseName: tbgp
    user: tbgp
