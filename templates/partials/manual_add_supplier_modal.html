<div class="modal fade" id="manualAddsupplierModal" tabindex="-1" aria-labelledby="manualAddsupplierModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header bg-brand text-white">
                <h5 class="modal-title" id="manualAddsupplierModalLabel"><i class="bi bi-box-seam"></i> Add supplier</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form id="manualAddsupplierForm">
                <div class="modal-body">
                    <div id="manualAddsupplierAlert" class="alert alert-danger d-none py-2 small" role="alert"></div>

                    <div class="row g-3">
                        <div class="col-md-4">
                            <label for="manualsupplierId" class="form-label">supplier ID <span class="text-danger">*</span></label>
                            <input type="number" id="manualsupplierId" name="supplier_id" class="form-control" min="1" step="1" required>
                        </div>
                        <div class="col-md-4">
                            <label for="manualsupplierBatch" class="form-label">Batch <span class="text-danger">*</span></label>
                            <input type="number" id="manualsupplierBatch" name="batch" class="form-control" min="1" step="1" required>
                        </div>
                        <div class="col-md-4">
                            <label for="manualMemberReferrerId" class="form-label">Member Referrer <span class="text-danger">*</span></label>
                            <select id="manualMemberReferrerId" name="member_referrer_id" class="form-select" required>
                                <option value="">— Select member referrer —</option>
                                {% for ref in members %}
                                <option value="{{ ref.member_id }}">
                                    #{{ ref.member_id }} — {{ ref.full_name }} (Batch {{ ref.batch }})
                                </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label for="manualCompanyName" class="form-label">Company Name <span class="text-danger">*</span></label>
                            <input type="text" id="manualCompanyName" name="company_name" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label for="manualRepresentativeName" class="form-label">Representative Name</label>
                            <input type="text" id="manualRepresentativeName" name="representative_name" class="form-control">
                        </div>

                        <div class="col-md-6">
                            <label for="manualContactNo" class="form-label">Contact No.</label>
                            <input type="text" id="manualContactNo" name="contact_no" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label for="manualsupplierDateJoined" class="form-label">Date Joined</label>
                            <input type="date" id="manualsupplierDateJoined" name="date_joined" class="form-control">
                        </div>

                        <div class="col-12">
                            <label for="manualCompanyAddress" class="form-label">Company Address</label>
                            <textarea id="manualCompanyAddress" name="company_address" class="form-control" rows="2"></textarea>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-brand">Add supplier</button>
                </div>
            </form>
        </div>
    </div>
</div>
