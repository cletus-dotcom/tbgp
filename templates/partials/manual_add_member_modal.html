<div class="modal fade" id="manualAddMemberModal" tabindex="-1" aria-labelledby="manualAddMemberModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header bg-brand text-white">
                <h5 class="modal-title" id="manualAddMemberModalLabel"><i class="bi bi-person-plus"></i> Add Member</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form id="manualAddMemberForm" class="modal-form-scroll">
                <div class="modal-body">
                    <div id="manualAddMemberAlert" class="alert alert-danger d-none py-2 small" role="alert"></div>

                    <p class="text-muted small fw-semibold text-uppercase mb-2">Membership</p>
                    <div class="row g-3 mb-3">
                        <div class="col-md-3">
                            <label for="manualMemberId" class="form-label">Member ID <span class="text-danger">*</span></label>
                            <input type="number" id="manualMemberId" name="member_id" class="form-control" min="1" step="1" required>
                        </div>
                        <div class="col-md-3">
                            <label for="manualBatch" class="form-label">Batch <span class="text-danger">*</span></label>
                            <input type="number" id="manualBatch" name="batch" class="form-control" min="1" step="1" required>
                        </div>
                        <div class="col-md-3">
                            <label for="manualDateJoined" class="form-label">Date Joined</label>
                            <input type="date" id="manualDateJoined" name="date_joined" class="form-control">
                        </div>
                        <div class="col-md-3">
                            <label for="manualStatus" class="form-label">Status <span class="text-danger">*</span></label>
                            <select id="manualStatus" name="status" class="form-select" required>
                                {% for s in member_statuses %}
                                <option value="{{ s }}">{{ s }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-12">
                            <label for="manualReferrerId" class="form-label">Referrer</label>
                            <select id="manualReferrerId" name="referrer_id" class="form-select">
                                <option value="">— None (Batch 1 only) —</option>
                                {% for ref in members %}
                                <option value="{{ ref.member_id }}">
                                    #{{ ref.member_id }} — {{ ref.full_name }} (Batch {{ ref.batch }})
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <p class="text-muted small fw-semibold text-uppercase mb-2">Personal Information</p>
                    <div class="row g-3 mb-3">
                        <div class="col-md-3">
                            <label for="manualFirstName" class="form-label">First Name <span class="text-danger">*</span></label>
                            <input type="text" id="manualFirstName" name="first_name" class="form-control" required>
                        </div>
                        <div class="col-md-3">
                            <label for="manualMiddleName" class="form-label">Middle Name</label>
                            <input type="text" id="manualMiddleName" name="middle_name" class="form-control">
                        </div>
                        <div class="col-md-3">
                            <label for="manualLastName" class="form-label">Last Name <span class="text-danger">*</span></label>
                            <input type="text" id="manualLastName" name="last_name" class="form-control" required>
                        </div>
                        <div class="col-md-3">
                            <label for="manualSuffix" class="form-label">Suffix</label>
                            <input type="text" id="manualSuffix" name="suffix" class="form-control" placeholder="Jr., II, etc.">
                        </div>
                        <div class="col-md-3">
                            <label for="manualBirthDate" class="form-label">Birth Date</label>
                            <input type="date" id="manualBirthDate" name="birth_date" class="form-control">
                        </div>
                        <div class="col-md-3">
                            <label for="manualGender" class="form-label">Gender</label>
                            <input type="text" id="manualGender" name="gender" class="form-control">
                        </div>
                        <div class="col-md-3">
                            <label for="manualCivilStatus" class="form-label">Civil Status</label>
                            <input type="text" id="manualCivilStatus" name="civil_status" class="form-control">
                        </div>
                        <div class="col-md-3">
                            <label for="manualPhone" class="form-label">Phone</label>
                            <input type="text" id="manualPhone" name="phone" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label for="manualEmail" class="form-label">Email</label>
                            <input type="email" id="manualEmail" name="email" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label for="manualAddress" class="form-label">Address</label>
                            <textarea id="manualAddress" name="address" class="form-control" rows="2"></textarea>
                        </div>
                    </div>

                    <p class="text-muted small fw-semibold text-uppercase mb-2">Employment &amp; Dependents</p>
                    <div class="row g-3 mb-3">
                        <div class="col-md-4">
                            <label for="manualHighestEducation" class="form-label">Highest Education</label>
                            <input type="text" id="manualHighestEducation" name="highest_education" class="form-control">
                        </div>
                        <div class="col-md-4">
                            <label for="manualOccupation" class="form-label">Occupation / Income Source</label>
                            <input type="text" id="manualOccupation" name="occupation_income_source" class="form-control">
                        </div>
                        <div class="col-md-4">
                            <label for="manualMonthlyIncome" class="form-label">Monthly Income</label>
                            <input type="text" id="manualMonthlyIncome" name="monthly_income" class="form-control">
                        </div>
                        <div class="col-md-4">
                            <label for="manualDependents" class="form-label">Number of Dependents</label>
                            <input type="number" id="manualDependents" name="number_of_dependents" class="form-control" min="0" step="1">
                        </div>
                        {% if is_admin_role(session.get('role')) %}
                        <div class="col-md-4">
                            <label for="manualLifetimeCapAmount" class="form-label">Lifetime Limit Threshold</label>
                            <input type="text" id="manualLifetimeCapAmount" name="lifetime_cap_amount" class="form-control lifetime-cap-input"
                                   inputmode="decimal" value="{{ '{:,.0f}'.format(member_lifetime_earnings_cap) }}">
                            <p class="text-muted small mb-0 mt-1">
                                After this amount, project earnings are capped at {{ '{:,.0f}'.format(member_lifetime_project_cap_after_limit) }}.
                            </p>
                        </div>
                        <div class="col-md-4 d-flex align-items-end">
                            <div class="form-check mb-2">
                                <input class="form-check-input" type="checkbox" id="manualLifetimeCapEnabled"
                                       name="lifetime_cap_enabled" value="1" checked>
                                <label class="form-check-label" for="manualLifetimeCapEnabled">
                                    Enforce lifetime limit rule
                                </label>
                            </div>
                        </div>
                        {% endif %}
                    </div>

                    <p class="text-muted small fw-semibold text-uppercase mb-2">Beneficiary</p>
                    <div class="row g-3 mb-3">
                        <div class="col-md-4">
                            <label for="manualBeneficiaryName" class="form-label">Beneficiary Name</label>
                            <input type="text" id="manualBeneficiaryName" name="beneficiary_name" class="form-control">
                        </div>
                        <div class="col-md-4">
                            <label for="manualBeneficiaryPhone" class="form-label">Beneficiary Phone</label>
                            <input type="text" id="manualBeneficiaryPhone" name="beneficiary_phone" class="form-control">
                        </div>
                        <div class="col-md-12">
                            <label for="manualBeneficiaryAddress" class="form-label">Beneficiary Address</label>
                            <textarea id="manualBeneficiaryAddress" name="beneficiary_address" class="form-control" rows="2"></textarea>
                        </div>
                    </div>

                    <p class="text-muted small fw-semibold text-uppercase mb-2">Separation</p>
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label for="manualTerminationDate" class="form-label">Separation Date</label>
                            <input type="date" id="manualTerminationDate" name="termination_date" class="form-control">
                        </div>
                        <div class="col-md-8">
                            <label for="manualTerminationType" class="form-label">Separation Type</label>
                            <select id="manualTerminationType" name="termination_type" class="form-select">
                                <option value="">— Select separation type —</option>
                                {% for t in member_separation_types %}
                                <option value="{{ t }}">{{ t }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-brand">Add Member</button>
                </div>
            </form>
        </div>
    </div>
</div>
