<div class="modal fade" id="editMyProfileModal" tabindex="-1" aria-labelledby="editMyProfileModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header bg-brand text-white">
                <h5 class="modal-title" id="editMyProfileModalLabel"><i class="bi bi-pencil-square"></i> Edit My Information</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form id="editMyProfileForm" class="modal-form-scroll">
                <div class="modal-body">
                    <div id="editMyProfileAlert" class="alert alert-danger d-none py-2 small" role="alert"></div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-4">
                            <label class="form-label">Member ID</label>
                            <input type="text" id="selfEditMemberIdDisplay" class="form-control" disabled>
                        </div>
                        <div class="col-md-8">
                            <label class="form-label">Name</label>
                            <input type="text" id="selfEditFullNameDisplay" class="form-control" disabled>
                        </div>
                    </div>
                    <p class="text-muted small mb-3">
                        You can update contact details, employment information, and beneficiary records.
                        Ask Staff or Admin to change your name, batch, referrer, or membership status.
                    </p>

                    <p class="text-muted small fw-semibold text-uppercase mb-2">Contact</p>
                    <div class="row g-3 mb-3">
                        <div class="col-md-4">
                            <label for="selfEditGender" class="form-label">Gender</label>
                            <input type="text" id="selfEditGender" name="gender" class="form-control">
                        </div>
                        <div class="col-md-4">
                            <label for="selfEditCivilStatus" class="form-label">Civil Status</label>
                            <input type="text" id="selfEditCivilStatus" name="civil_status" class="form-control">
                        </div>
                        <div class="col-md-4">
                            <label for="selfEditPhone" class="form-label">Phone</label>
                            <input type="text" id="selfEditPhone" name="phone" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label for="selfEditEmail" class="form-label">Email</label>
                            <input type="email" id="selfEditEmail" name="email" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label for="selfEditAddress" class="form-label">Address</label>
                            <textarea id="selfEditAddress" name="address" class="form-control" rows="2"></textarea>
                        </div>
                    </div>

                    <p class="text-muted small fw-semibold text-uppercase mb-2">Employment &amp; Dependents</p>
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label for="selfEditHighestEducation" class="form-label">Highest Education</label>
                            <input type="text" id="selfEditHighestEducation" name="highest_education" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label for="selfEditOccupation" class="form-label">Occupation / Income Source</label>
                            <input type="text" id="selfEditOccupation" name="occupation_income_source" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label for="selfEditMonthlyIncome" class="form-label">Monthly Income</label>
                            <input type="text" id="selfEditMonthlyIncome" name="monthly_income" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label for="selfEditDependents" class="form-label">Number of Dependents</label>
                            <input type="number" id="selfEditDependents" name="number_of_dependents" class="form-control" min="0" step="1">
                        </div>
                    </div>

                    <p class="text-muted small fw-semibold text-uppercase mb-2">Beneficiary</p>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="selfEditBeneficiaryName" class="form-label">Beneficiary Name</label>
                            <input type="text" id="selfEditBeneficiaryName" name="beneficiary_name" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label for="selfEditBeneficiaryPhone" class="form-label">Beneficiary Phone</label>
                            <input type="text" id="selfEditBeneficiaryPhone" name="beneficiary_phone" class="form-control">
                        </div>
                        <div class="col-md-12">
                            <label for="selfEditBeneficiaryAddress" class="form-label">Beneficiary Address</label>
                            <textarea id="selfEditBeneficiaryAddress" name="beneficiary_address" class="form-control" rows="2"></textarea>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-brand">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
</div>
