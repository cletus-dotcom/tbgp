<div class="modal fade" id="editContractorModal" tabindex="-1" aria-labelledby="editContractorModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header bg-brand text-white">
                <h5 class="modal-title" id="editContractorModalLabel"><i class="bi bi-pencil-square"></i> Edit Contractor</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form id="editContractorForm">
                <div class="modal-body">
                    <div id="editContractorAlert" class="alert alert-danger d-none py-2 small" role="alert"></div>
                    <input type="hidden" id="editContractorId" name="contractor_id">

                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label">Contractor ID</label>
                            <input type="text" id="editContractorIdDisplay" class="form-control" disabled>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Batch</label>
                            <input type="text" id="editContractorBatch" class="form-control" disabled>
                        </div>
                        <div class="col-md-4">
                            <label for="editMemberReferrerId" class="form-label">Member Referrer <span class="text-danger">*</span></label>
                            <select id="editMemberReferrerId" name="member_referrer_id" class="form-select" required>
                                {% for ref in members %}
                                <option value="{{ ref.member_id }}">
                                    #{{ ref.member_id }} — {{ ref.full_name }} (Batch {{ ref.batch }})
                                </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label for="editCompanyName" class="form-label">Company Name <span class="text-danger">*</span></label>
                            <input type="text" id="editCompanyName" name="company_name" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label for="editRepresentativeName" class="form-label">Representative Name</label>
                            <input type="text" id="editRepresentativeName" name="representative_name" class="form-control">
                        </div>

                        <div class="col-md-6">
                            <label for="editContactNo" class="form-label">Contact No.</label>
                            <input type="text" id="editContactNo" name="contact_no" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label for="editContractorDateJoined" class="form-label">Date Joined</label>
                            <input type="date" id="editContractorDateJoined" name="date_joined" class="form-control">
                        </div>

                        <div class="col-12">
                            <label for="editCompanyAddress" class="form-label">Company Address</label>
                            <textarea id="editCompanyAddress" name="company_address" class="form-control" rows="2"></textarea>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-brand">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
</div>
