<div class="comfort-view-widget">
    <button type="button"
            class="comfort-view-toggle comfort-view-toggle--{{ placement|default('topbar') }}"
            data-comfort-view-open
            aria-haspopup="dialog"
            aria-controls="comfortViewPanel"
            aria-expanded="false"
            aria-label="Open reading and contrast settings"
            title="Reading and contrast settings">
        <i class="bi bi-universal-access-circle" aria-hidden="true"></i>
        <span class="comfort-view-toggle-label">Reading</span>
    </button>
</div>
