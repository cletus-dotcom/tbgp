<div class="idle-screensaver" id="idleScreensaver" data-idle-time="120000" aria-hidden="true">
    <div class="idle-screensaver-panel" role="dialog" aria-modal="true" aria-labelledby="idleScreensaverTitle">
        <div class="idle-build-scene" aria-hidden="true">
            <div class="idle-structure">
                <span style="--layer-width: 150px; --layer-delay: 0.25s;"></span>
                <span style="--layer-width: 124px; --layer-delay: 0.65s;"></span>
                <span style="--layer-width: 96px; --layer-delay: 1.05s;"></span>
                <span style="--layer-width: 68px; --layer-delay: 1.45s;"></span>
            </div>
            <div class="idle-truck">
                <span class="idle-truck-wheel"></span>
                <span class="idle-truck-wheel"></span>
                <span class="idle-truck-wheel"></span>
            </div>
            <div class="idle-build-ground"></div>
        </div>
        <h2 class="idle-screensaver-title" id="idleScreensaverTitle">
            Building the Nation.
            <span>Powering the People.</span>
        </h2>
        <p class="idle-screensaver-copy">
            Nation-building never sleeps. Move the mouse, press any key, or tap the screen to resume.
        </p>
        <div class="idle-screensaver-actions">
            <button type="button" class="btn btn-brand" id="idleScreensaverResume">Resume Work</button>
            <span class="idle-screensaver-hint">Idle screensaver starts after 2 minutes.</span>
        </div>
    </div>
</div>
