<div class="modal fade" id="editMemberModal" tabindex="-1" aria-labelledby="editMemberModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header bg-brand text-white">
                <h5 class="modal-title" id="editMemberModalLabel"><i class="bi bi-pencil-square"></i> Edit Member</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form id="editMemberForm" class="modal-form-scroll">
                <div class="modal-body">
                    <div id="editMemberAlert" class="alert alert-danger d-none py-2 small" role="alert"></div>
                    <input type="hidden" id="editMemberId" name="member_id">

                    <p class="text-muted small fw-semibold text-uppercase mb-2">Membership</p>
                    <div class="row g-3 mb-3">
                        <div class="col-md-3">
                            <label class="form-label">Member ID</label>
                            <input type="text" id="editMemberIdDisplay" class="form-control" disabled>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Batch</label>
                            <input type="text" id="editBatch" class="form-control" disabled>
                        </div>
                        <div class="col-md-3">
                            <label for="editDateJoined" class="form-label">Date Joined</label>
                            <input type="date" id="editDateJoined" name="date_joined" class="form-control">
                        </div>
                        <div class="col-md-3">
                            <label for="editStatus" class="form-label">Status <span class="text-danger">*</span></label>
                            <select id="editStatus" name="status" class="form-select" required>
                                {% for s in member_statuses %}
                                <option value="{{ s }}">{{ s }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-12">
                            <label for="editReferrerId" class="form-label">Referrer</label>
                            <select id="editReferrerId" name="referrer_id" class="form-select">
                                <option value="">— None (Batch 1 only) —</option>
                                {% for ref in members %}
                                <option value="{{ ref.member_id }}">
                                    #{{ ref.member_id }} — {{ ref.full_name }} (Batch {{ ref.batch }})
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <p class="text-muted small fw-semibold text-uppercase mb-2">Personal Information</p>
                    <div class="row g-3 mb-3">
                        <div class="col-md-3">
                            <label for="editFirstName" class="form-label">First Name <span class="text-danger">*</span></label>
                            <input type="text" id="editFirstName" name="first_name" class="form-control" required>
                        </div>
                        <div class="col-md-3">
                            <label for="editMiddleName" class="form-label">Middle Name</label>
                            <input type="text" id="editMiddleName" name="middle_name" class="form-control">
                        </div>
                        <div class="col-md-3">
                            <label for="editLastName" class="form-label">Last Name <span class="text-danger">*</span></label>
                            <input type="text" id="editLastName" name="last_name" class="form-control" required>
                        </div>
                        <div class="col-md-3">
                            <label for="editSuffix" class="form-label">Suffix</label>
                            <input type="text" id="editSuffix" name="suffix" class="form-control" placeholder="Jr., II, etc.">
                        </div>
                        <div class="col-md-3">
                            <label for="editBirthDate" class="form-label">Birth Date</label>
                            <input type="date" id="editBirthDate" name="birth_date" class="form-control">
                        </div>
                        <div class="col-md-3">
                            <label for="editGender" class="form-label">Gender</label>
                            <input type="text" id="editGender" name="gender" class="form-control">
                        </div>
                        <div class="col-md-3">
                            <label for="editCivilStatus" class="form-label">Civil Status</label>
                            <input type="text" id="editCivilStatus" name="civil_status" class="form-control">
                        </div>
                        <div class="col-md-3">
                            <label for="editPhone" class="form-label">Phone</label>
                            <input type="text" id="editPhone" name="phone" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label for="editEmail" class="form-label">Email</label>
                            <input type="email" id="editEmail" name="email" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label for="editAddress" class="form-label">Address</label>
                            <textarea id="editAddress" name="address" class="form-control" rows="2"></textarea>
                        </div>
                    </div>

                    <p class="text-muted small fw-semibold text-uppercase mb-2">Employment &amp; Dependents</p>
                    <div class="row g-3 mb-3">
                        <div class="col-md-4">
                            <label for="editHighestEducation" class="form-label">Highest Education</label>
                            <input type="text" id="editHighestEducation" name="highest_education" class="form-control">
                        </div>
                        <div class="col-md-4">
                            <label for="editOccupation" class="form-label">Occupation / Income Source</label>
                            <input type="text" id="editOccupation" name="occupation_income_source" class="form-control">
                        </div>
                        <div class="col-md-4">
                            <label for="editMonthlyIncome" class="form-label">Monthly Income</label>
                            <input type="text" id="editMonthlyIncome" name="monthly_income" class="form-control">
                        </div>
                        <div class="col-md-4">
                            <label for="editDependents" class="form-label">Number of Dependents</label>
                            <input type="number" id="editDependents" name="number_of_dependents" class="form-control" min="0" step="1">
                        </div>
                        {% if is_admin_role(session.get('role')) %}
                        <div class="col-md-4">
                            <label for="editLifetimeCapAmount" class="form-label">Lifetime Limit Threshold</label>
                            <input type="text" id="editLifetimeCapAmount" name="lifetime_cap_amount" class="form-control lifetime-cap-input"
                                   inputmode="decimal" value="{{ '{:,.0f}'.format(member_lifetime_earnings_cap) }}">
                            <p class="text-muted small mb-0 mt-1">
                                After this amount, project earnings are capped at {{ '{:,.0f}'.format(member_lifetime_project_cap_after_limit) }}.
                            </p>
                        </div>
                        <div class="col-md-4 d-flex align-items-end">
                            <div class="form-check mb-2">
                                <input class="form-check-input" type="checkbox" id="editLifetimeCapEnabled"
                                       name="lifetime_cap_enabled" value="1" checked>
                                <label class="form-check-label" for="editLifetimeCapEnabled">
                                    Enforce lifetime limit rule
                                </label>
                            </div>
                        </div>
                        {% endif %}
                    </div>

                    <p class="text-muted small fw-semibold text-uppercase mb-2">Beneficiary</p>
                    <div class="row g-3 mb-3">
                        <div class="col-md-4">
                            <label for="editBeneficiaryName" class="form-label">Beneficiary Name</label>
                            <input type="text" id="editBeneficiaryName" name="beneficiary_name" class="form-control">
                        </div>
                        <div class="col-md-4">
                            <label for="editBeneficiaryPhone" class="form-label">Beneficiary Phone</label>
                            <input type="text" id="editBeneficiaryPhone" name="beneficiary_phone" class="form-control">
                        </div>
                        <div class="col-md-12">
                            <label for="editBeneficiaryAddress" class="form-label">Beneficiary Address</label>
                            <textarea id="editBeneficiaryAddress" name="beneficiary_address" class="form-control" rows="2"></textarea>
                        </div>
                    </div>

                    <p class="text-muted small fw-semibold text-uppercase mb-2">Separation</p>
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label for="editTerminationDate" class="form-label">Separation Date</label>
                            <input type="date" id="editTerminationDate" name="termination_date" class="form-control">
                        </div>
                        <div class="col-md-8">
                            <label for="editTerminationType" class="form-label">Separation Type</label>
                            <select id="editTerminationType" name="termination_type" class="form-select">
                                <option value="">— Select separation type —</option>
                                {% for t in member_separation_types %}
                                <option value="{{ t }}">{{ t }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-brand">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
</div>
